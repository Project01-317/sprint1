<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Passenger List — Group 15 Airline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Spline+Sans:wght@500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()">
    <span>◐</span><span class="label">Dark</span>
  </button>

  <nav class="app-nav">
    <span class="brand">
      <svg class="plane" viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5z"/></svg>
    </span>
    <a href="dashboard.html">Dashboard</a>
    <a href="passengers.html" class="active">Passenger List</a>
    <span class="spacer"></span>
    <span class="user">
      <span id="navEmail">—</span>
      <span class="logout" onclick="logout()">Log out</span>
    </span>
  </nav>

  <main class="dash-body">
    <h1 class="welcome">Passenger List &amp; Seat Map</h1>
    <p class="welcome-sub">ADM-02 · Admin view of flight occupancy. Pick a flight to see its seat map and manifest.</p>

    <div class="glass-panel">
      <form id="paxFlightForm" class="search-grid">
        <div class="field" style="grid-column: 1 / -2;">
          <label for="paxFlightSelect">Flight</label>
          <select id="paxFlightSelect"></select>
        </div>
        <div class="field search-btn-container">
          <button type="submit" class="btn btn-primary bubbly-btn">Load Seat Map</button>
        </div>
      </form>
    </div>

    <div id="paxAlert" class="alert"></div>

    <section id="seatmapSection" hidden>
      <div class="section-head">
        <div>
          <h2 id="seatmapTitle">Seat Map</h2>
          <p id="seatmapSubtitle"></p>
        </div>
        <div class="view-toggle" role="group" aria-label="View mode">
          <button type="button" id="mapViewBtn" class="booking-tab active" aria-pressed="true">Seat Map</button>
          <button type="button" id="tableViewBtn" class="booking-tab" aria-pressed="false">Table View</button>
        </div>
      </div>

      <div class="seatmap-summary" id="seatmapSummary"></div>

      <div class="seatmap-legend" aria-hidden="true">
        <span class="legend-item"><span class="seat-swatch available"></span> Available</span>
        <span class="legend-item"><span class="seat-swatch occupied"></span> Occupied</span>
        <span class="legend-item"><span class="seat-swatch selected"></span> Selected</span>
        <span class="legend-item"><span class="accom-mark">♿</span> Accommodation</span>
      </div>

      <div id="seatmapView" class="seatmap-scroll"></div>

      <div id="tableView" hidden>
        <div class="booking-table-wrap">
          <table class="bookings-table" id="paxTable">
            <caption class="sr-only">Passenger manifest for the selected flight</caption>
            <thead>
              <tr>
                <th scope="col">Booking Ref</th>
                <th scope="col">Passenger</th>
                <th scope="col">Seat</th>
                <th scope="col">Class</th>
                <th scope="col">Accommodations</th>
              </tr>
            </thead>
            <tbody id="paxTableBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => wirePassengerList());
  </script>
</body>
</html>
