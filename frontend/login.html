<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — Group 15 Airline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Spline+Sans:wght@500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()">
    <span>◐</span><span class="label">Dark</span>
  </button>

  <main class="auth-stage">
    <section class="card">
      <div class="board">
        <span class="code"><span class="dot"></span></span>
        <span>Secure sign in</span>
      </div>
      <div class="card-body">
        <h1 class="headline">Log in</h1>
        <p class="subhead">Access your bookings and trips.</p>

        <div id="alert" class="alert"></div>

        <form id="loginForm" novalidate>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="you@example.com" autocomplete="email" required />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
          </div>
          <a class="link" href="signup.html">I don't have an account</a>
          <button id="submitBtn" type="submit" class="btn btn-primary">Log in</button>
        </form>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
