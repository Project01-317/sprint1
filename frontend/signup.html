<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create account — Group 15 Airline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Spline+Sans:wght@500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()">
    <span>◐</span><span class="label">Dark</span>
  </button>

  <main class="auth-stage">
    <section class="card">
      <div class="board">
        <span>New account</span>
      </div>
      <div class="card-body">
        <h1 class="headline">Create account</h1>
        <p class="subhead">A few details and you're ready to fly.</p>

        <div id="alert" class="alert"></div>

        <form id="signupForm" novalidate>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="you@example.com" autocomplete="email" required />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="At least 8 characters" autocomplete="new-password" required />
          </div>
          <div class="field">
            <label for="confirm">Confirm password</label>
            <input id="confirm" type="password" placeholder="Re-enter password" autocomplete="new-password" required />
          </div>
          <div class="btn-row">
            <a href="login.html" class="btn btn-ghost" style="text-align:center;text-decoration:none;line-height:1.4;">Back</a>
            <button id="submitBtn" type="submit" class="btn btn-primary">Create account</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
