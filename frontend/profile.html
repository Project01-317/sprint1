<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile setup — Group 15 Airline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Spline+Sans:wght@500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()">
    <span>◐</span><span class="label">Dark</span>
  </button>

  <main class="auth-stage">
    <section class="card wide">
      <div class="board">
        <span>Passenger details</span>
      </div>
      <div class="card-body">
        <h1 class="headline">Profile setup</h1>
        <p class="subhead">We use these details on your bookings and boarding passes.</p>

        <div id="alert" class="alert"></div>

        <form id="profileForm" novalidate>
          <div class="grid-2">
            <div class="field">
              <label for="first_name">First name</label>
              <input id="first_name" type="text" required />
            </div>
            <div class="field">
              <label for="last_name">Last name</label>
              <input id="last_name" type="text" required />
            </div>
          </div>
          <div class="grid-2">
            <div class="field">
              <label for="phone">Phone number</label>
              <input id="phone" type="tel" placeholder="e.g. 226 555 0143" required />
            </div>
            <div class="field">
              <label for="city">City</label>
              <input id="city" type="text" required />
            </div>
          </div>
          <div class="field">
            <label for="address">Address</label>
            <input id="address" type="text" required />
          </div>
          <div class="field">
            <label for="province">Province</label>
            <select id="province" required>
              <option value="" disabled selected>Select a province</option>
              <option>Alberta</option><option>British Columbia</option>
              <option>Manitoba</option><option>New Brunswick</option>
              <option>Newfoundland and Labrador</option><option>Nova Scotia</option>
              <option>Ontario</option><option>Prince Edward Island</option>
              <option>Quebec</option><option>Saskatchewan</option>
            </select>
          </div>
          <button id="submitBtn" type="submit" class="btn btn-primary">Save and continue</button>
        </form>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
